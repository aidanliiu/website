<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery — Aidan Liu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #080808;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
    }

    .back-btn {
      position: fixed; top: 28px; left: 28px; z-index: 200;
      font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase;
      color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s;
    }
    .back-btn:hover { color: #fff; }

    .gallery-description {
      position: fixed; bottom: 34px; left: 30px; z-index: 200;
      max-width: 300px; font-size: 11px; line-height: 1.75;
      color: rgba(255,255,255,0.38); pointer-events: none;
    }

    .gallery-tooltip {
      position: fixed; bottom: 28px; right: 28px; z-index: 200;
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; pointer-events: none;
    }
    .tooltip-cursor-stage {
      position: relative; width: 72px; height: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .tooltip-line {
      position: absolute; width: 56px; height: 1px;
      background: linear-gradient(90deg, transparent 0%,
        rgba(255,255,255,0.2) 30%, rgba(255,255,255,0.2) 70%, transparent 100%);
    }
    .tooltip-cursor {
      position: relative; z-index: 1;
      animation: cursorFloat 2.8s cubic-bezier(0.37,0,0.63,1) infinite;
    }
    @keyframes cursorFloat {
      0%   { transform: translateX(20px); opacity: 0.3; }
      20%  { opacity: 1; }
      50%  { transform: translateX(-20px); }
      80%  { opacity: 1; }
      100% { transform: translateX(20px); opacity: 0.3; }
    }
    .tooltip-text {
      font-size: 10px; letter-spacing: 0.09em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); white-space: nowrap;
    }

    #vp { position: fixed; inset: 0; overflow: hidden; cursor: grab; }
    #vp.dragging { cursor: grabbing; }

    /*
      Canvas fits snugly around all 6 clusters.
      No single row spans the full width — groups are scattered
      so there's always something nearby in every direction.

      CLUSTER MAP (approximate centers):
        Robotics   →  ~38vw,  ~35vw   (top-left)
        Music      →  ~93vw,  ~34vw   (top-center)
        Art        →  ~22vw,  ~105vw  (bottom-left)
        Basketball →  ~76vw,  ~108vw  (bottom-center)
        Community  →  ~145vw, ~68vw   (center-right)
        Weights    →  ~195vw, ~88vw   (far right)
    */
    #cv {
      position: absolute; top: 0; left: 0;
      width: 215vw; height: 148vw;
      will-change: transform;
    }

    .gi {
      position: absolute; overflow: hidden; background: #080808;
    }
    .gi img, .gi video {
      width: 100%; height: 100%;
      object-fit: contain; object-position: center;
      display: block; pointer-events: none;
    }

    .gl {
      position: absolute;
      font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.14); pointer-events: none; white-space: nowrap;
    }

    /* ── ROBOTICS (top-left) ── */
    .r1 { width:36vw; aspect-ratio:4/3;  left:8vw;  top:5vw;  }
    .r2 { width:22vw; aspect-ratio:4/3;  left:50vw; top:8vw;  }
    .r3 { width:38vw; aspect-ratio:4/3;  left:12vw; top:40vw; }

    /* ── MUSIC (top-center) ── */
    .m1 { width:16vw; aspect-ratio:3/4;  left:84vw; top:6vw;  }
    .m2 { width:14vw; aspect-ratio:9/16; left:87vw; top:38vw; }

    /* ── ART (bottom-left) ── */
    .a1 { width:14vw; aspect-ratio:9/16; left:10vw; top:82vw;  }
    .a2 { width:28vw; aspect-ratio:4/3;  left:8vw;  top:112vw; }

    /* ── BASKETBALL (bottom-center) ── */
    .b1 { width:30vw; aspect-ratio:4/3;  left:82vw; top:76vw;  }
    .b2 { width:26vw; aspect-ratio:4/3;  left:50vw; top:88vw;  }
    .b3 { width:14vw; aspect-ratio:2/3;  left:84vw; top:107vw; }
    .b4 { width:14vw; aspect-ratio:2/3;  left:52vw; top:112vw; }

    /* ── COMMUNITY (center-right) ── */
    .c1 { width:34vw; aspect-ratio:16/9; left:120vw; top:44vw; }
    .c2 { width:12vw; aspect-ratio:1/2;  left:160vw; top:42vw; }
    .c3 { width:26vw; aspect-ratio:4/3;  left:122vw; top:80vw; }
    .c4 { width:22vw; aspect-ratio:4/3;  left:154vw; top:82vw; }

    /* ── WEIGHTLIFTING (far right) ── */
    .w1 { width:18vw; aspect-ratio:9/16; left:188vw; top:52vw; }
    .w2 { width:18vw; aspect-ratio:9/16; left:188vw; top:94vw; }

  </style>
</head>
<body>

<a href="index.html" class="back-btn">← Back to home</a>

<div id="vp">
  <div id="cv">

    <!-- ROBOTICS -->
    <div class="gi r1"><img src="vex-arena.jpg"       alt="VEX Worlds arena"   loading="eager"></div>
    <div class="gi r2"><img src="robot-build.jpg"     alt="Building the robot" loading="eager"></div>
    <div class="gi r3"><img src="robot-field.jpg"     alt="On the field"       loading="eager"></div>
    <div class="gl" style="left:12vw; top:73vw">Robotics</div>

    <!-- MUSIC -->
    <div class="gi m1"><img src="violin-perf.jpg"     alt="Violin performance" loading="eager"></div>
    <div class="gi m2"><img src="violin-practice.jpg" alt="Violin practice"    loading="lazy"></div>
    <div class="gl" style="left:86vw; top:68vw">Music</div>

    <!-- ART -->
    <div class="gi a1"><img src="art4hearts.jpg"      alt="Art4Hearts"         loading="lazy"></div>
    <div class="gi a2"><img src="art-project.jpg"     alt="Art project"        loading="lazy"></div>
    <div class="gl" style="left:10vw; top:137vw">Art</div>

    <!-- BASKETBALL -->
    <div class="gi b1"><img src="bball-team.jpg"      alt="Team celebration"   loading="lazy"></div>
    <div class="gi b2"><img src="young-bball.jpg"     alt="Young Aidan"        loading="lazy"></div>
    <div class="gi b3"><img src="bball-dribble.jpg"   alt="Dribbling"          loading="lazy"></div>
    <div class="gi b4"><img src="bball-shot.jpg"      alt="Jump shot"          loading="lazy"></div>
    <div class="gl" style="left:52vw; top:137vw">Basketball</div>

    <!-- COMMUNITY -->
    <div class="gi c1"><img src="pep-rally.jpg"       alt="Pep rally"          loading="lazy"></div>
    <div class="gi c2"><img src="certificates.jpg"    alt="Certificates"       loading="lazy"></div>
    <div class="gi c3"><img src="spirit-week.jpg"     alt="Spirit week"        loading="lazy"></div>
    <div class="gi c4"><img src="research.jpg"        alt="Research"           loading="lazy"></div>
    <div class="gl" style="left:122vw; top:104vw">Community</div>

    <!-- WEIGHTLIFTING -->
    <div class="gi w1">
      <video autoplay loop muted playsinline>
        <source src="wl1.mp4" type="video/mp4">
      </video>
    </div>
    <div class="gi w2">
      <video autoplay loop muted playsinline>
        <source src="weightlifting2.mp4" type="video/mp4">
      </video>
    </div>
    <div class="gl" style="left:188vw; top:131vw">Weightlifting</div>

  </div>
</div>

<div class="gallery-description">
  A look at the moments that shaped who I am — robotics, basketball,
  music, art, and everything in between.
</div>

<div class="gallery-tooltip">
  <div class="tooltip-cursor-stage">
    <div class="tooltip-line"></div>
    <div class="tooltip-cursor">
      <svg width="16" height="22" viewBox="0 0 16 22" fill="none">
        <path d="M1 1.5L1 17L5 13.5L7.5 20.5L10 19.5L7.5 13L13 13L1 1.5Z"
              fill="white" stroke="rgba(0,0,0,0.6)" stroke-width="0.8" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
  <span class="tooltip-text">Click + hold to drag</span>
</div>

<script>
(function () {
  var vp = document.getElementById('vp');
  var cv = document.getElementById('cv');
  var px = 0, py = 0, vx = 0, vy = 0;
  var down = false, ox = 0, oy = 0;
  var lx = 0, ly = 0, lt = 0, raf = 0;

  function bounds() {
    return {
      x0: -(cv.offsetWidth  - window.innerWidth),
      y0: -(cv.offsetHeight - window.innerHeight),
      x1: 0, y1: 0
    };
  }
  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
  function move() { cv.style.transform = 'translate(' + px + 'px,' + py + 'px)'; }

  function coast() {
    vx *= 0.934; vy *= 0.934;
    if (Math.abs(vx) < 0.07 && Math.abs(vy) < 0.07) return;
    var b = bounds();
    px = clamp(px + vx, b.x0, b.x1);
    py = clamp(py + vy, b.y0, b.y1);
    if (px === b.x0 || px === b.x1) vx *= -0.1;
    if (py === b.y0 || py === b.y1) vy *= -0.1;
    move();
    raf = requestAnimationFrame(coast);
  }

  vp.addEventListener('mousedown', function(e) {
    if (e.button) return;
    cancelAnimationFrame(raf);
    down = true; vp.classList.add('dragging');
    ox = e.clientX - px; oy = e.clientY - py;
    lx = e.clientX; ly = e.clientY; lt = Date.now();
    vx = 0; vy = 0; e.preventDefault();
  });
  window.addEventListener('mousemove', function(e) {
    if (!down) return;
    var now = Date.now(), dt = Math.max(1, now - lt);
    vx = (e.clientX - lx) / dt * 16;
    vy = (e.clientY - ly) / dt * 16;
    lx = e.clientX; ly = e.clientY; lt = now;
    var b = bounds();
    px = clamp(e.clientX - ox, b.x0, b.x1);
    py = clamp(e.clientY - oy, b.y0, b.y1);
    move();
  });
  window.addEventListener('mouseup', function() {
    if (!down) return;
    down = false; vp.classList.remove('dragging');
    raf = requestAnimationFrame(coast);
  });

  var tsx=0, tsy=0, tlx=0, tly=0, tlt=0;
  vp.addEventListener('touchstart', function(e) {
    cancelAnimationFrame(raf);
    var t = e.touches[0];
    tsx = t.clientX - px; tsy = t.clientY - py;
    tlx = t.clientX; tly = t.clientY; tlt = Date.now();
    vx = 0; vy = 0;
  }, { passive: true });
  vp.addEventListener('touchmove', function(e) {
    var t = e.touches[0], now = Date.now(), dt = Math.max(1, now - tlt);
    vx = (t.clientX - tlx) / dt * 16;
    vy = (t.clientY - tly) / dt * 16;
    tlx = t.clientX; tly = t.clientY; tlt = now;
    var b = bounds();
    px = clamp(t.clientX - tsx, b.x0, b.x1);
    py = clamp(t.clientY - tsy, b.y0, b.y1);
    move();
  }, { passive: true });
  vp.addEventListener('touchend', function() { raf = requestAnimationFrame(coast); });

  document.querySelectorAll('img').forEach(function(i) {
    i.addEventListener('dragstart', function(e) { e.preventDefault(); });
  });
})();
</script>
</body>
</html>
